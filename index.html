<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniHub | Smartphones & Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .premium-gold { background: linear-gradient(90deg, #D4AF37, #F9E29C); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-black">O</div>
            <h1 class="text-xl font-bold tracking-tighter">OMNIHUB</h1>
        </div>
        <div class="text-[10px] bg-yellow-600 px-2 py-1 rounded-full uppercase font-bold">Visiteur</div>
    </nav>

    <header class="premium-gold p-6 text-center shadow-inner">
        <h2 class="text-xl font-black text-black">ESPACE OMNI PREMIUM</h2>
        <p class="text-xs text-black font-semibold mb-3">Accès Prioritaire & Livraison Gratuite</p>
        <button onclick="openPayment('Abonnement Premium', 5000)" class="bg-black text-white px-8 py-2 rounded-full font-bold text-sm shadow-lg">ACTIVER (5.000 FCFA)</button>
    </header>

    <main class="p-4 space-y-6">
        <section>
            <h3 class="text-lg font-bold mb-4 text-black">📱 Smartphones & High-Tech</h3>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <h4 class="text-lg font-bold">iPhone 15 Pro Max</h4>
                <p class="text-blue-600 font-black text-xl">850.000 FCFA</p>
                <button onclick="openPayment('iPhone 15 Pro Max', 850000)" class="w-full mt-3 bg-black text-white py-3 rounded-xl font-bold">Commander</button>
            </div>
        </section>
    </main>

    <div id="pay-modal" class="fixed inset-0 bg-black/80 hidden z-[100] p-6 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center">
            <h3 id="pay-title" class="text-xl font-bold mb-2">Choisir le mode de paiement</h3>
            <p id="pay-amount" class="text-2xl font-black text-blue-600 mb-6">0 FCFA</p>
            <div class="grid grid-cols-1 gap-3 mb-6">
                <button onclick="showFinalStep('WAVE')" class="p-4 border-2 border-blue-500 rounded-xl text-blue-600 font-bold">Payer par WAVE</button>
                <button onclick="showFinalStep('ORANGE')" class="p-4 border-2 border-orange-500 rounded-xl text-orange-600 font-bold">Payer par ORANGE MONEY</button>
                <button onclick="showFinalStep('CARD')" class="p-4 border-2 border-gray-800 rounded-xl text-gray-800 font-bold">💳 Carte Visa / MasterCard</button>
            </div>
            <button onclick="closeModal()" class="text-gray-400 text-sm">Annuler</button>
        </div>
    </div>

    <div id="final-step" class="fixed inset-0 bg-white hidden z-[110] p-6 text-center flex flex-col items-center justify-center">
        <h3 class="text-xl font-bold mb-4">Scannez pour payer</h3>
        <div id="qr-display" class="w-72 h-72 bg-gray-100 rounded-2xl mb-8 flex items-center justify-center border-4 border-black overflow-hidden shadow-2xl">
            </div>
        <p class="text-sm text-gray-500 mb-6 px-4 italic">Une fois le paiement fait, envoyez la capture d'écran sur WhatsApp.</p>
        <button onclick="finishProcess()" class="bg-green-600 text-white w-full py-4 rounded-2xl font-black shadow-xl">J'AI EFFECTUÉ LE PAIEMENT ✅</button>
    </div>

    <script>
        let currentAmount = 0;

        function openPayment(title, price) {
            currentAmount = price;
            document.getElementById('pay-title').innerText = title;
            document.getElementById('pay-amount').innerText = price.toLocaleString() + " FCFA";
            document.getElementById('pay-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('pay-modal').classList.add('hidden'); }

        function showFinalStep(provider) {
            document.getElementById('pay-modal').classList.add('hidden');
            document.getElementById('final-step').classList.remove('hidden');
            const display = document.getElementById('qr-display');
            
            // Liens directs vers tes fichiers GitHub
            if(provider === 'WAVE') {
                display.innerHTML = '<img src="https://raw.githubusercontent.com/Papib1/Tape-OmniHub/principal/1000300978.jpg" class="w-full h-full object-contain">';
            } else if(provider === 'ORANGE') {
                display.innerHTML = '<img src="https://raw.githubusercontent.com/Papib1/Tape-OmniHub/principal/1000300998.jpg" class="w-full h-full object-contain">';
            } else {
                display.innerHTML = '<div class="p-4"><p class="font-bold">Contactez-nous sur WhatsApp pour le lien de paiement Carte Bancaire (Visa/MasterCard).</p></div>';
            }
        }

        function finishProcess() {
            window.location.href = "https://wa.me/TON_NUMERO_ICI"; // Remplace par ton numéro WhatsApp
        }
    </script>
</body>
</html>
